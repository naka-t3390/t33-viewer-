<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>T33 Drive ビューア</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H"
      crossorigin="anonymous">
</head>
<body>
<header>
  <h1>T33 Drive ビューア</h1>
  <button id="login">Google でログイン</button>
  <select id="date" class="hidden"></select>
  <select id="session" class="hidden"></select>
  <span id="status"></span>
</header>
<div id="error"></div>
<div id="warnings" class="warn"></div>
<div class="gaugebar">
  <div class="gauge"><span class="k">速度</span><span class="v" id="g-speed">--</span><span class="u">km/h</span></div>
  <div class="gauge"><span class="k">回転</span><span class="v" id="g-rpm">--</span><span class="u">rpm</span></div>
  <div class="gauge"><span class="k">水温</span><span class="v" id="g-coolant">--</span><span class="u">℃</span></div>
  <div class="gauge"><span class="k">スロットル</span><span class="v" id="g-throttle">--</span><span class="u">%</span></div>
  <div class="gauge"><span class="k">HV状態</span><span class="v" id="g-hv">--</span></div>
  <div class="gauge"><span class="k">時刻</span><span class="v" id="g-time">0.0</span><span class="u">s</span></div>
</div>
<div class="mid">
  <video id="video" controls playsinline></video>
  <canvas id="graph"></canvas>
</div>
<div id="map" class="nomap"></div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH"
        crossorigin="anonymous"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
